<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Buku Kas Pasar — PUD Pasar Kota Medan</title>
<!-- Link ke Manifest PWA -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1F3D2E">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="apple-touch-icon" href="icon-192.png">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght=500;600;700&family=EB+Garamond:ital,wght=0,400;0,500;0,600;1,400&family=Courier+Prime:wght=400;700&display=swap" rel="stylesheet">
<!-- QR Code Library CDN -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
:root{
  --ledger-green:#1F3D2E;
  --ledger-green-dark:#122720;
  --paper:#F4EAD0;
  --paper-2:#EDE0BE;
  --paper-line:#CBB78C;
  --brass:#A8792B;
  --brass-light:#C9A227;
  --stempel-red:#A32C2C;
  --ink:#26221A;
  --ink-soft:#5B4E37;
  --maroon:#6E2A2A;
  --ok:#2F5B3F;
  --shadow: 0 6px 18px rgba(20,15,5,0.25);
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;height:100%;}
body{
  font-family:'EB Garamond', serif;
  background:var(--paper);
  color:var(--ink);
  min-height:100vh;
  background-image:
    repeating-linear-gradient(to bottom, transparent 0 34px, rgba(203,183,140,0.55) 34px 35px);
  background-attachment:local;
}
h1,h2,h3,h4{font-family:'Cormorant Garamond', serif; margin:0; font-weight:700; color:var(--ledger-green);}
.mono{font-family:'Courier Prime', monospace;}
button{font-family:'EB Garamond', serif; cursor:pointer;}
input, select{font-family:'EB Garamond', serif;}
#app{min-height:100vh; display:flex; flex-direction:column;}
.fade-in{animation:fadeIn .45s ease both;}
@keyframes fadeIn{from{opacity:0; transform:translateY(6px);} to{opacity:1; transform:translateY(0);}}

/* ---------- Ornamental frame bits ---------- */
.corner{position:absolute; width:22px; height:22px; border:2px solid var(--brass-light);}
.corner.tl{top:10px; left:10px; border-right:none; border-bottom:none;}
.corner.tr{top:10px; right:10px; border-left:none; border-bottom:none;}
.corner.bl{bottom:10px; left:10px; border-right:none; border-top:none;}
.corner.br{bottom:10px; right:10px; border-left:none; border-top:none;}

/* ---------- Cover / role select ---------- */
.cover{
  flex:1; display:flex; align-items:center; justify-content:center;
  background:
    radial-gradient(circle at 50% 0%, rgba(255,255,255,0.04), transparent 60%),
    var(--ledger-green);
  position:relative; padding:24px;
}
.cover-frame{
  position:relative; max-width:640px; width:100%;
  border:1.5px solid var(--brass-light); padding:52px 40px;
  text-align:center;
}
.cover-frame::before{
  content:""; position:absolute; inset:8px; border:1px solid rgba(201,162,39,0.45); pointer-events:none;
}
.eyebrow{
  color:var(--brass-light); letter-spacing:5px; font-family:'Courier Prime',monospace;
  font-size:12px; text-transform:uppercase; margin-bottom:14px;
}
.cover-frame h1{color:var(--paper); font-size:44px; letter-spacing:1px; line-height:1.1;}
.cover-frame .sub{color:var(--paper-2); font-size:17px; margin-top:10px; font-style:italic; opacity:.85;}
.divider{
  width:120px; height:1px; background:var(--brass-light); margin:26px auto; position:relative;
}
.divider::after{content:"❖"; position:absolute; left:50%; top:50%; transform:translate(-50%,-50%); background:var(--ledger-green); color:var(--brass-light); padding:0 10px; font-size:13px;}
.role-row{display:flex; gap:16px; margin-top:30px; flex-wrap:wrap; justify-content:center;}
.role-btn{
  flex:1; min-width:200px; background:transparent; border:1.5px solid var(--brass-light); color:var(--paper);
  padding:20px 18px; font-family:'Cormorant Garamond',serif; font-size:22px; font-weight:600;
  letter-spacing:1px; transition:.2s ease; position:relative;
}
.role-btn small{display:block; font-family:'EB Garamond',serif; font-weight:400; font-size:13px; opacity:.75; margin-top:6px; letter-spacing:0; font-style:italic;}
.role-btn:hover{background:rgba(201,162,39,0.14); border-color:var(--paper);}

/* ---------- Auth screens ---------- */
.auth-wrap{flex:1; display:flex; align-items:center; justify-content:center; padding:26px;}
.auth-card{
  width:100%; max-width:440px; background:var(--paper); border:1px solid var(--paper-line);
  box-shadow:var(--shadow); padding:36px 34px; position:relative;
}
.back-link{
  position:fixed; top:18px; left:18px; color:var(--paper); background:var(--ledger-green);
  border:1px solid var(--brass-light); padding:8px 14px; font-size:13px; letter-spacing:1px;
  text-transform:uppercase; z-index:5;
}
.auth-header{text-align:center; margin-bottom:22px;}
.auth-header .badge{
  display:inline-block; font-family:'Courier Prime',monospace; font-size:11px; letter-spacing:3px;
  color:var(--brass); border:1px solid var(--brass); padding:3px 10px; margin-bottom:10px; text-transform:uppercase;
}
.auth-header h2{font-size:28px;}
.tabs{display:flex; border-bottom:1.5px solid var(--paper-line); margin-bottom:22px;}
.tab{flex:1; text-align:center; padding:10px 0; font-family:'Cormorant Garamond',serif; font-size:18px; font-weight:600; color:var(--ink-soft); background:none; border:none; border-bottom:2px solid transparent; margin-bottom:-1.5px;}
.tab.active{color:var(--ledger-green); border-bottom-color:var(--ledger-green);}
.field{margin-bottom:16px;}
.field label{display:block; font-size:13px; letter-spacing:.5px; color:var(--ink-soft); margin-bottom:5px; text-transform:uppercase; font-family:'Courier Prime',monospace;}
.field input, .field select{
  width:100%; padding:10px 11px; border:1px solid var(--paper-line); background:#fbf6e8;
  font-size:16px; color:var(--ink);
}
.field input:focus, .field select:focus{outline:2px solid var(--brass-light); outline-offset:1px;}
.toggle-row{display:flex; gap:10px;}
.toggle-opt{flex:1; text-align:center; padding:10px; border:1px solid var(--paper-line); background:#fbf6e8; font-size:15px; cursor:pointer;}
.toggle-opt.selected{background:var(--ledger-green); color:var(--paper); border-color:var(--ledger-green);}
.btn-primary{
  width:100%; background:var(--ledger-green); color:var(--paper); border:none; padding:13px;
  font-size:17px; letter-spacing:1px; font-family:'Cormorant Garamond',serif; font-weight:700; margin-top:6px;
}
.btn-primary:hover{background:var(--ledger-green-dark);}
.btn-outline{
  width:100%; background:transparent; color:var(--ledger-green); border:1.5px solid var(--ledger-green); padding:11px;
  font-size:15px; margin-top:10px; font-family:'EB Garamond',serif;
}
.hint{font-size:13px; color:var(--ink-soft); margin-top:14px; text-align:center; line-height:1.5;}
.error-box{background:#f4d9d9; border:1px solid var(--stempel-red); color:var(--maroon); padding:9px 12px; font-size:14px; margin-bottom:14px;}
.success-box{background:#e0ead9; border:1px solid var(--ok); color:var(--ok); padding:12px; font-size:14px; margin-bottom:14px; text-align:center;}
.id-reveal{font-family:'Courier Prime',monospace; font-size:22px; letter-spacing:2px; color:var(--ledger-green); background:#fff; border:1.5px dashed var(--brass); padding:10px; text-align:center; margin:10px 0;}

/* ---------- Dashboard shell ---------- */
.topbar{
  background:var(--ledger-green); color:var(--paper); padding:16px 26px; display:flex; align-items:center;
  justify-content:space-between; flex-wrap:wrap; gap:10px; border-bottom:3px solid var(--brass-light);
}
.topbar .brand{font-family:'Cormorant Garamond',serif; font-size:21px; letter-spacing:.5px;}
.topbar .brand small{display:block; font-family:'Courier Prime',monospace; font-size:10.5px; letter-spacing:2px; opacity:.75; text-transform:uppercase;}
.topbar .who{display:flex; align-items:center; gap:14px; font-size:14.5px;}
.topbar .who .name{font-weight:600;}
.logout-btn{background:transparent; border:1px solid var(--brass-light); color:var(--paper); padding:7px 14px; font-size:13px; letter-spacing:.5px; cursor:pointer;}
.content{flex:1; padding:26px; max-width:1120px; margin:0 auto; width:100%;}
.grid{display:grid; grid-template-columns:1.15fr 1fr; gap:22px;}
@media(max-width:860px){.grid{grid-template-columns:1fr;}}
.card{background:var(--paper); border:1px solid var(--paper-line); box-shadow:var(--shadow); padding:22px 24px; margin-bottom:22px; position:relative;}
.card-title{font-size:14px; letter-spacing:2px; text-transform:uppercase; color:var(--brass); font-family:'Courier Prime',monospace; margin-bottom:14px; border-bottom:1px solid var(--paper-line); padding-bottom:10px;}
.big-total{font-family:'Cormorant Garamond',serif; font-size:38px; font-weight:700; color:var(--ledger-green);}
.row-line{display:flex; justify-content:space-between; padding:7px 0; border-bottom:1px dotted var(--paper-line); font-size:15px;}
.row-line:last-child{border-bottom:none;}
table{width:100%; border-collapse:collapse; font-size:14.5px;}
th{text-align:left; font-family:'Courier Prime',monospace; font-size:11.5px; letter-spacing:1px; text-transform:uppercase; color:var(--ink-soft); border-bottom:2px solid var(--ink); padding:8px 6px;}
td{padding:9px 6px; border-bottom:1px solid var(--paper-line); vertical-align:middle;}
tr:hover td{background:rgba(168,121,43,0.06);}
.tag{display:inline-block; font-family:'Courier Prime',monospace; font-size:11px; padding:3px 8px; letter-spacing:.5px; border-radius:2px;}
.tag.paid{background:#e0ead9; color:var(--ok); border:1px solid var(--ok);}
.tag.unpaid{background:#f4d9d9; color:var(--maroon); border:1px solid var(--maroon);}
.link-btn{background:none; border:none; color:var(--ledger-green); text-decoration:underline; font-size:13.5px; padding:0; cursor:pointer;}
.pay-btn{background:var(--brass); color:#fff; border:none; padding:8px 16px; font-size:14px; letter-spacing:.5px; cursor:pointer;}
.pay-btn:hover{background:var(--brass-light);}
.empty-state{padding:26px; text-align:center; color:var(--ink-soft); font-style:italic;}
.search-bar{display:flex; gap:10px; margin-bottom:16px; flex-wrap:wrap;}
.search-bar input, .search-bar select{padding:9px 10px; border:1px solid var(--paper-line); background:#fbf6e8; font-size:15px;}
.search-bar input{flex:1; min-width:180px;}
.stat-strip{display:grid; grid-template-columns:repeat(3,1fr); gap:14px; margin-bottom:22px;}
@media(max-width:640px){.stat-strip{grid-template-columns:1fr;}}
.stat-box{background:var(--ledger-green); color:var(--paper); padding:16px 18px; text-align:center; border-top:3px solid var(--brass-light);}
.stat-box .num{font-family:'Cormorant Garamond',serif; font-size:26px; font-weight:700;}
.stat-box .lbl{font-family:'Courier Prime',monospace; font-size:10.5px; letter-spacing:1.5px; text-transform:uppercase; opacity:.8; margin-top:4px;}

/* Pengurus Tab Navigation CSS */
.pengurus-nav{display:flex; gap:8px; padding:10px 26px; background:var(--paper-2); border-bottom:1px solid var(--paper-line);}
.nav-tab{background:transparent; border:1px solid transparent; color:var(--ink-soft); padding:8px 16px; font-size:15px; font-weight:600;}
.nav-tab.active{background:var(--paper); border-color:var(--paper-line) var(--paper-line) transparent var(--paper-line); color:var(--ledger-green); border-radius:4px 4px 0 0; margin-bottom:-11px;}

/* Stamp */
.stamp{
  display:inline-flex; align-items:center; justify-content:center; text-align:center;
  width:78px; height:78px; border-radius:50%; border:3px double var(--stempel-red);
  color:var(--stempel-red); font-family:'Courier Prime',monospace; font-weight:700; font-size:12px;
  letter-spacing:1.5px; transform:rotate(-11deg); opacity:.88; mix-blend-mode:multiply; line-height:1.25;
  flex-shrink:0;
}

/* Modal & QR Box */
.modal-bg{position:fixed; inset:0; background:rgba(18,15,8,0.6); display:flex; align-items:center; justify-content:center; z-index:50; padding:20px;}
.receipt, .qr-modal-card{
  background:#fbf6e8; width:100%; max-width:380px; padding:26px 24px; border:1px solid var(--paper-line);
  box-shadow:var(--shadow); position:relative; border-radius:6px;
}
.receipt-close{position:absolute; top:8px; right:10px; background:none; border:none; font-size:20px; color:var(--ink-soft); cursor:pointer;}
.receipt h3, .qr-modal-card h3{text-align:center; font-size:20px;}
.receipt .sub-r, .qr-modal-card .sub-r{text-align:center; font-size:12px; color:var(--ink-soft); font-family:'Courier Prime',monospace; letter-spacing:1px; margin-bottom:14px;}
.receipt hr, .qr-modal-card hr{border:none; border-top:1px dashed var(--paper-line); margin:12px 0;}
.receipt .r-row, .qr-modal-card .r-row{display:flex; justify-content:space-between; font-size:14px; padding:3px 0;}
.receipt .r-total, .qr-modal-card .r-total{display:flex; justify-content:space-between; font-size:18px; font-weight:700; font-family:'Cormorant Garamond',serif; color:var(--ledger-green); padding-top:6px;}
.receipt-stamp-wrap{display:flex; justify-content:center; margin:14px 0;}
.receipt-actions, .qr-actions{display:flex; gap:10px; margin-top:16px;}
.receipt-actions button, .qr-actions button{flex:1; padding:10px; font-size:13.5px; border:1px solid var(--ledger-green); background:transparent; color:var(--ledger-green); cursor:pointer;}
.receipt-actions button.solid, .qr-actions button.solid{background:var(--ledger-green); color:var(--paper);}

.qr-container { display:flex; justify-content:center; align-items:center; margin:20px 0; background:#fff; padding:15px; border:1px dashed var(--brass); }

/* ========================================================
   CSS PERBAIKAN CETAK / PRINT (JAMINAN ANTI LAG & ANTI KOSONG)
   ======================================================== */
#print-section { display: none; }

@media print {
  html, body {
    background: #ffffff !important;
    color: #000000 !important;
    font-family: 'EB Garamond', serif !important;
  }
  /* Sembunyikan pembungkus aplikasi agar tidak terjadi penumpukan/render ulang */
  #app { display: none !important; }
  
  /* Tampilkan area khusus cetak sebagai satu-satunya elemen di halaman */
  #print-section { 
    display: block !important; 
    width: 100% !important; 
    position: absolute; 
    top: 0; 
    left: 0; 
  }
  
  /* Sembunyikan elemen dekoratif tombol dari cetakan */
  .no-print, button, .receipt-actions, .receipt-close { display: none !important; }
  
  /* Aturan Cetak Struk agar pas di kertas */
  .receipt {
    border: none !important;
    box-shadow: none !important;
    background: #fff !important;
    margin: 0 auto !important;
    padding: 10px !important;
    width: 100% !important;
    max-width: 100% !important;
  }
  
  /* Aturan Tabel Laporan */
  table { 
    width: 100% !important; 
    border-collapse: collapse !important; 
    border: 1px solid #000 !important; 
    margin-top: 15px !important;
  }
  th, td { 
    border: 1px solid #000 !important; 
    padding: 8px 6px !important; 
    color: #000 !important; 
  }
}
.footer-note{text-align:center; font-size:12px; color:var(--ink-soft); padding:16px; font-style:italic;}
</style>

<body>

<!-- Kontainer Aplikasi Utama (Layar Browser) -->
<div id="app"></div>

<!-- Kontainer Mesin Printer Sistem (Terpisah di Root untuk Kecepatan Cetak) -->
<div id="print-section"></div>

<script>
/* ===================== Konstanta ===================== */
const BIAYA_KIOS = 20000;
const BIAYA_KEBERSIHAN = 10000;
const BULAN_ID = ['','Januari','Februari','Maret','April','Mei','Juni','Juli','Agustus','September','Oktober','November','Desember'];

/* ===================== Storage helpers ===================== */
const LOCAL_PREFIX = 'pasar_kios__';
let hasCloudStorage = (typeof window !== 'undefined') && !!window.storage && typeof window.storage.get === 'function';

async function ujiCloudStorage(){
  if(!hasCloudStorage) return;
  try{
    await window.storage.set('__healthcheck__', JSON.stringify({ok:true}), true);
  }catch(e){
    hasCloudStorage = false;
  }
}

async function dbGet(key, def=null){
  try{
    if(hasCloudStorage){
      const r = await window.storage.get(key, true);
      return r ? JSON.parse(r.value) : def;
    }
    const raw = localStorage.getItem(LOCAL_PREFIX + key);
    return raw !== null ? JSON.parse(raw) : def;
  }catch(e){ return def; }
}
async function dbSet(key, value){
  try{
    if(hasCloudStorage){ return await window.storage.set(key, JSON.stringify(value), true); }
    localStorage.setItem(LOCAL_PREFIX + key, JSON.stringify(value));
    return { key, value };
  }catch(e){ return null; }
}
async function dbList(prefix){
  try{
    if(hasCloudStorage){
      const r = await window.storage.list(prefix, true);
      return (r && r.keys) ? r.keys : [];
    }
    const keys = [];
    for(let i=0; i<localStorage.length; i++){
      const k = localStorage.key(i);
      if(k && k.startsWith(LOCAL_PREFIX + prefix)){ keys.push(k.substring(LOCAL_PREFIX.length)); }
    }
    return keys;
  }catch(e){ return []; }
}

/* ===================== Util ===================== */
function rupiah(n){ return 'Rp ' + Number(n||0).toLocaleString('id-ID'); }
function ymNow(){ const d=new Date(); return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0'); }
function formatBulanYM(ym){ const [y,m]=ym.split('-'); return BULAN_ID[parseInt(m,10)] + ' ' + y; }
function enumerateMonths(startYM){
  const [sy,sm] = startYM.split('-').map(Number);
  const now = new Date(); const ey = now.getFullYear(), em = now.getMonth()+1;
  let months=[]; let y=sy,m=sm;
  let guard=0;
  while((y<ey || (y===ey && m<=em)) && guard<240){
    months.push(y+'-'+String(m).padStart(2,'0')); m++; if(m>12){m=1;y++;} guard++;
  }
  return months;
}
function nowTanggalJam(){
  const d = new Date();
  return {
    tanggal: d.toLocaleDateString('id-ID',{day:'2-digit',month:'long',year:'numeric'}),
    jam: d.toLocaleTimeString('id-ID',{hour:'2-digit',minute:'2-digit',second:'2-digit'}),
    iso: d.toISOString()
  };
}
function esc(s){ return String(s==null?'':s).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

/* ===================== State ===================== */
let state = { screen:'cover', session:null, authTab:'login', err:'', pengurusFilter:'', laporanBulan: ymNow(), strukPayload:null, daftarKebersihan:true, pengurusActiveTab:'pedagang' };
const app = document.getElementById('app');

/* ===================== Init ===================== */
async function initApp(){
  await ujiCloudStorage();
  const admin = await dbGet('pengurus:admin');
  if(!admin){ await dbSet('pengurus:admin', {username:'admin_pud', password:'pasar123', nama:'Petugas PUD Pasar Kota Medan'}); }
  const counter = await dbGet('pedagang_counter');
  if(counter===null){ await dbSet('pedagang_counter', 0); }
  goto('cover');
}

function goto(screen, extra){
  state.screen = screen; state.err='';
  if(extra) Object.assign(state, extra);
  drawScreen();
}

async function drawScreen(){
  switch(state.screen){
    case 'cover': app.innerHTML = tplCover(); break;
    case 'pedagang-auth': app.innerHTML = tplPedagangAuth(); break;
    case 'pengurus-auth': app.innerHTML = tplPengurusAuth(); break;
    case 'pedagang-dash': await drawPedagangDash(); break;
    case 'pengurus-dash': await drawPengurusDash(); break;
  }
  app.classList.remove('fade-in'); void app.offsetWidth; app.classList.add('fade-in');
}

/* ===================== Templates Auth & Cover ===================== */
function tplCover(){
  return `
  <div class="cover">
    <div class="cover-frame">
      <div class="corner tl"></div><div class="corner tr"></div><div class="corner bl"></div><div class="corner br"></div>
      <div class="eyebrow">Perusahaan Umum Daerah</div>
      <h1>Buku Kas Pasar</h1>
      <div class="sub">Pencatatan Retribusi Kios &amp; Kebersihan — PUD Pasar Kota Medan</div>
      <div class="divider"></div>
      <div class="role-row">
        <button class="role-btn" onclick="goto('pedagang-auth')">Pedagang<small>Bayar retribusi &amp; lihat struk</small></button>
        <button class="role-btn" onclick="goto('pengurus-auth')">Pengurus<small>PUD Pasar Kota Medan</small></button>
      </div>
    </div>
  </div>`;
}

function tplPedagangAuth(){
  const tab = state.authTab;
  return `
  <button class="back-link no-print" onclick="goto('cover')">‹ Kembali</button>
  <div class="auth-wrap">
    <div class="auth-card">
      <div class="auth-header">
        <div class="badge">Loket Pedagang</div>
        <h2>${tab==='login'?'Masuk Akun Pedagang':'Daftar Pedagang Baru'}</h2>
      </div>
      <div class="tabs">
        <button class="tab ${tab==='login'?'active':''}" onclick="state.authTab='login'; goto('pedagang-auth')">Login</button>
        <button class="tab ${tab==='daftar'?'active':''}" onclick="state.authTab='daftar'; goto('pedagang-auth')">Daftar</button>
      </div>
      ${state.err? `<div class="error-box">${esc(state.err)}</div>`:''}
      ${tab==='login' ? `
        <div class="field"><label>ID Pedagang</label><input id="in-id" placeholder="Contoh: PD0001" class="mono"></div>
        <div class="field"><label>Kata Sandi</label><input id="in-pass" type="password" placeholder="Kata sandi"></div>
        <button class="btn-primary" onclick="doPedagangLogin()">Masuk</button>
      ` : `
        <div class="field"><label>Nama Lengkap</label><input id="d-nama" placeholder="Nama pedagang"></div>
        <div class="field"><label>Nomor Kios</label><input id="d-kios" placeholder="Contoh: A-12"></div>
        <div class="field">
          <label>Layanan Kebersihan Bulanan</label>
          <div class="toggle-row">
            <div class="toggle-opt ${state.daftarKebersihan? 'selected':''}" onclick="state.daftarKebersihan=true; goto('pedagang-auth')">Ikut</div>
            <div class="toggle-opt ${!state.daftarKebersihan? 'selected':''}" onclick="state.daftarKebersihan=false; goto('pedagang-auth')">Tidak Ikut</div>
          </div>
        </div>
        <div class="field"><label>Kata Sandi</label><input id="d-pass" type="password" placeholder="Buat kata sandi"></div>
        <div class="field"><label>Ulangi Kata Sandi</label><input id="d-pass2" type="password" placeholder="Ulangi kata sandi"></div>
        <button class="btn-primary" onclick="doPedagangDaftar()">Daftar</button>
      `}
    </div>
  </div>`;
}

async function doPedagangDaftar(){
  const nama = document.getElementById('d-nama').value.trim();
  const kios = document.getElementById('d-kios').value.trim();
  const pass = document.getElementById('d-pass').value;
  const pass2 = document.getElementById('d-pass2').value;
  if(!nama || !kios || !pass){ state.err='Mohon lengkapi semua data.'; return goto('pedagang-auth'); }
  if(pass !== pass2){ state.err='Kata sandi tidak sama.'; return goto('pedagang-auth'); }
  let counter = await dbGet('pedagang_counter', 0);
  counter += 1;
  const id = 'PD' + String(counter).padStart(4,'0');
  await dbSet('pedagang:'+id, { id, nama, no_kios:kios, password:pass, kebersihan: state.daftarKebersihan, terdaftar_bulan: ymNow() });
  await dbSet('pedagang_counter', counter);
  state.authTab='login'; state.err=''; goto('pedagang-auth');
  alert('Pendaftaran Berhasil! ID Pedagang Anda: ' + id);
}

async function doPedagangLogin(){
  const idInput = document.getElementById('in-id').value.trim().toUpperCase();
  const passInput = document.getElementById('in-pass').value.trim();
  const data = await dbGet('pedagang:' + idInput);
  if(!data || String(data.password) !== passInput){ state.err = 'ID Pedagang atau Sandi Salah!'; return goto('pedagang-auth'); }
  state.session = { role:'pedagang', id: data.id };
  goto('pedagang-dash');
}

function tplPengurusAuth(){
  return `
  <button class="back-link no-print" onclick="goto('cover')">‹ Kembali</button>
  <div class="auth-wrap">
    <div class="auth-card">
      <div class="auth-header"><div class="badge">Sistem Pengurus</div><h2>Otoritas PUD Pasar</h2></div>
      ${state.err? `<div class="error-box">${esc(state.err)}</div>`:''}
      <div class="field"><label>Username</label><input id="p-user" class="mono"></div>
      <div class="field"><label>Kata Sandi</label><input id="p-pass" type="password"></div>
      <button class="btn-primary" onclick="doPengurusLogin()">Masuk</button>
    </div>
  </div>`;
}

async function doPengurusLogin(){
  const user = document.getElementById('p-user').value.trim();
  const pass = document.getElementById('p-pass').value.trim();
  const admin = await dbGet('pengurus:admin');
  if(admin.username !== user || admin.password !== pass){ state.err = 'Kredensial salah!'; return goto('pengurus-auth'); }
  state.session = { role:'pengurus' };
  state.pengurusActiveTab = 'pedagang';
  goto('pengurus-dash');
}

function logout(){ state.session = null; goto('cover'); }

/* ===================== Pedagang Dashboard ===================== */
async function drawPedagangDash(){
  const id = state.session.id;
  const p = await dbGet('pedagang:'+id);
  if(!p){ logout(); return; }
  
  if(!p.virtual_account){
    p.virtual_account = '8877' + String(id.replace('PD','')).padStart(5, '0');
    await dbSet('pedagang:'+id, p);
  }

  const months = enumerateMonths(p.terdaftar_bulan);
  const payments = {};
  for(const m of months){ payments[m] = await dbGet('payment:'+id+'-'+m); }

  const unpaidMonths = months.filter(m => !payments[m]);
  const totalBulanan = BIAYA_KIOS + (p.kebersihan ? BIAYA_KEBERSIHAN : 0);

  const historyRows = months.slice().reverse().filter(m=>payments[m]).map(m=>{
    const pay = payments[m];
    return `<tr>
      <td><b>${formatBulanYM(m)}</b></td>
      <td><span class="mono">${rupiah(pay.total)}</span><br><small style="color:var(--brass);">${esc(pay.metode_pembayaran)}</small></td>
      <td class="mono" style="font-size:12px;">${pay.tanggal}<br>${pay.jam}</td>
      <td><span class="tag paid">LUNAS</span></td>
      <td><button class="link-btn" onclick='bukaStruk("${m}")'>Buka Struk</button></td>
    </tr>`;
  }).join('');

  const tunggakanRows = unpaidMonths.map(m=>`
    <tr>
      <td><strong>${formatBulanYM(m)}</strong></td>
      <td class="mono">${rupiah(totalBulanan)}</td>
      <td>
        <select id="select-payment-${m}">
          <option value="QRIS Dinamis">QRIS Dinamis</option>
          <option value="Virtual Account">Virtual Account</option>
        </select>
      </td>
      <td><button class="pay-btn" onclick="initiasiPembayaran('${m}')">Bayar</button></td>
    </tr>`).join('');

  app.innerHTML = `
  <div class="topbar">
    <div class="brand">Buku Kas Pasar <span>| Portal Pedagang</span></div>
    <div class="who">${esc(p.nama)} (${p.id}) <button class="logout-btn" onclick="logout()">Keluar</button></div>
  </div>
  <div class="content">
    <div class="grid">
      <div>
        <div class="card">
          <div class="card-title">Tagihan Kios</div>
          <table><tbody>${tunggakanRows || '<tr><td colspan="4" style="text-align:center;color:green;">Semua retribusi lunas!</td></tr>'}</tbody></table>
        </div>
        <div class="card">
          <div class="card-title">Riwayat Transaksi</div>
          <table><tbody>${historyRows || '<tr><td colspan="5" style="text-align:center;">Belum ada riwayat.</td></tr>'}</tbody></table>
        </div>
      </div>
      <div>
        <div class="card">
          <div class="card-title">Virtual Account</div>
          <div style="background:#fff;padding:10px;text-align:center;font-size:20px;font-weight:bold;border:1px dashed var(--brass);">${p.virtual_account}</div>
        </div>
      </div>
    </div>
  </div>
  <div id="modal-slot"></div>`;
  window.__pedagangCache = {p, payments};
}

function initiasiPembayaran(bulan){
  const p = window.__pedagangCache.p;
  const metode = document.getElementById(`select-payment-${bulan}`).value;
  const total = BIAYA_KIOS + (p.kebersihan ? BIAYA_KEBERSIHAN : 0);

  if (metode.includes('QRIS')) {
    tampilkanModalQR(bulan, total, metode);
  } else {
    prosesEksekusiBayar(bulan, total, metode);
  }
}

function tampilkanModalQR(bulan, total, metode) {
  const slot = document.getElementById('modal-slot');
  slot.innerHTML = `
  <div class="modal-bg no-print">
    <div class="qr-modal-card">
      <button class="receipt-close" onclick="tutupStruk()">✕</button>
      <h3>Pembayaran QRIS</h3>
      <div class="qr-container" id="qr-renderer"></div>
      <div class="qr-actions">
        <button onclick="tutupStruk()">Batal</button>
        <button class="solid" onclick="prosesEksekusiBayar('${bulan}', ${total}, '${metode}')">Konfirmasi Sudah Bayar</button>
      </div>
    </div>
  </div>`;
  new QRCode(document.getElementById("qr-renderer"), { text: "PUD_MEDAN_"+total+"_"+bulan, width: 160, height: 160 });
}

async function prosesEksekusiBayar(bulan, total, metode){
  const id = state.session.id;
  const p = window.__pedagangCache.p;
  const t = nowTanggalJam();
  
  const payment = {
    id, no_kios: p.no_kios, nama: p.nama, bulan, biaya_kios: BIAYA_KIOS,
    biaya_kebersihan: p.kebersihan ? BIAYA_KEBERSIHAN : 0, total, tanggal: t.tanggal, jam: t.jam,
    metode_pembayaran: metode
  };
  
  await dbSet('payment:'+id+'-'+bulan, payment);
  await drawPedagangDash();
  bukaStruk(bulan);
}

/* ========================================================
   FIX STRUK PEDAGANG: Render Langsung ke Layar & Print Area
   ======================================================== */
function bukaStruk(bulan){
  const {p, payments} = window.__pedagangCache;
  const pay = payments[bulan] || state.strukPayload?.pay; 
  if(!pay) return;
  
  state.strukPayload = {p, pay};

  // HTML Bukti Transaksi Resmi yang Solid & Tidak Boleh Kosong
  const templateHtml = `
  <div class="receipt">
    <h3>BUKTI PEMBAYARAN RESMI</h3>
    <div class="sub-r">PUD PASAR KOTA MEDAN</div>
    <hr>
    <div class="r-row"><span>ID Pedagang</span><span class="mono"><b>${p.id}</b></span></div>
    <div class="r-row"><span>Nama Pedagang</span><span>${esc(p.nama)}</span></div>
    <div class="r-row"><span>No. Kios</span><span>${esc(p.no_kios)}</span></div>
    <div class="r-row"><span>Bulan Retribusi</span><span><b>${formatBulanYM(pay.bulan)}</b></span></div>
    <div class="r-row"><span>Metode Transaksi</span><span>${esc(pay.metode_pembayaran)}</span></div>
    <hr>
    <div class="r-row"><span>Biaya Retribusi Kios</span><span>${rupiah(pay.biaya_kios)}</span></div>
    <div class="r-row"><span>Biaya Kebersihan</span><span>${rupiah(pay.biaya_kebersihan)}</span></div>
    <hr>
    <div class="r-total"><span>TOTAL LUNAS</span><span>${rupiah(pay.total)}</span></div>
    <hr>
    <div class="r-row"><span>Tanggal Transaksi</span><span>${pay.tanggal}</span></div>
    <div class="r-row"><span>Waktu Pembayaran</span><span>${pay.jam} WIB</span></div>
    <div class="receipt-stamp-wrap">
      <div class="stamp">LUNAS<br><small>PUD PASAR</small></div>
    </div>
    <div class="receipt-actions no-print">
      <button onclick="tutupStruk()">Tutup</button>
      <button class="solid" onclick="window.print()">Cetak Dokumen</button>
    </div>
  </div>`;

  // Render untuk Tampilan Pop Up di Monitor
  document.getElementById('modal-slot').innerHTML = `
    <div class="modal-bg no-print" onclick="if(event.target===this) tutupStruk()">
      ${templateHtml}
    </div>`;

  // Render Siap Cetak untuk Driver Printer (Mencegah Blank/Kosong)
  document.getElementById('print-section').innerHTML = templateHtml;
}

function tutupStruk(){ 
  document.getElementById('modal-slot').innerHTML=''; 
  document.getElementById('print-section').innerHTML=''; 
}

/* ===================== Pengurus Dashboard ===================== */
async function drawPengurusDash(){
  const keys = await dbList('pedagang:');
  let semuaPedagang = [];
  for(const k of keys){ const d = await dbGet(k); if(d) semuaPedagang.push(d); }
  semuaPedagang.sort((a,b)=> a.id.localeCompare(b.id));

  const rows = [];
  for(const p of semuaPedagang){
    const months = enumerateMonths(p.terdaftar_bulan);
    let unpaid = [];
    let lastPaid = null;
    for(const m of months){
      const pay = await dbGet('payment:'+p.id+'-'+m);
      if(pay){ if(!lastPaid || m > lastPaid.bulan) lastPaid = pay; }
      else unpaid.push(m);
    }
    const tunggakanRp = unpaid.length * (BIAYA_KIOS + (p.kebersihan? BIAYA_KEBERSIHAN:0));
    rows.push({p, unpaidCount:unpaid.length, tunggakanRp, lastPaid});
  }

  app.innerHTML = `
  <div class="topbar">
    <div class="brand">Buku Kas Pasar<small>Akun Pengurus</small></div>
    <button class="logout-btn" onclick="logout()">Keluar</button>
  </div>
  <div class="pengurus-nav no-print">
    <button class="nav-tab ${state.pengurusActiveTab==='pedagang'?'active':''}" onclick="state.pengurusActiveTab='pedagang'; drawScreen();">Data Pedagang</button>
    <button class="nav-tab ${state.pengurusActiveTab==='laporan'?'active':''}" onclick="state.pengurusActiveTab='laporan'; drawScreen();">Laporan Pembayaran</button>
  </div>
  <div class="content">
    ${state.pengurusActiveTab === 'pedagang' ? `
      <div class="card">
        <table>
          <thead><tr><th>ID</th><th>Nama</th><th>Kios</th><th>Status</th><th>Tunggakan</th></tr></thead>
          <tbody>${rows.map(r=>`<tr><td>${r.p.id}</td><td>${esc(r.p.nama)}</td><td>${esc(r.p.no_kios)}</td><td>${r.unpaidCount===0?'LUNAS':'TUNGGAK'}</td><td>${rupiah(r.tunggakanRp)}</td></tr>`).join('')}</tbody>
        </table>
      </div>` : `
      <div class="card">
        <div class="search-bar no-print">
          <input type="month" id="laporan-bulan-input" value="${state.laporanBulan}" onchange="state.laporanBulan=this.value; renderLaporan()">
          <button class="btn-primary" style="width:auto;margin:0;" onclick="window.print()">🖶 Jalankan Cetak Sekarang</button>
        </div>
        <div id="laporan-slot"></div>
      </div>`}
  </div>`;
  
  if(state.pengurusActiveTab === 'laporan'){ await renderLaporan(); }
}

/* ========================================================
   FIX LAPORAN ADMIN: Inject Data ke Dua Tempat Sekaligus
   ======================================================== */
async function renderLaporan(){
  const bulan = state.laporanBulan || ymNow();
  const keys = await dbList('payment:');
  const matching = keys.filter(k => k.endsWith('-'+bulan));
  let items = [];
  for(const k of matching){ const d = await dbGet(k); if(d) items.push(d); }

  const totalKios = items.reduce((s,x)=>s+x.biaya_kios,0);
  const totalKebersihan = items.reduce((s,x)=>s+x.biaya_kebersihan,0);

  const tableRows = items.map(x=>`
    <tr>
      <td>${x.id}</td>
      <td>${esc(x.nama)}</td>
      <td>${esc(x.no_kios)}</td>
      <td>${rupiah(x.biaya_kios)}</td>
      <td>${rupiah(x.biaya_kebersihan)}</td>
      <td><b>${rupiah(x.total)}</b></td>
      <td>${x.tanggal}</td>
    </tr>`).join('') || `<tr><td colspan="7" style="text-align:center;">Belum ada rekap transaksi bulan ini.</td></tr>`;

  const laporanFinalHtml = `
    <div style="background:#fff; padding:15px; color:#000;">
      <h2 style="text-align:center;margin:0;">REKAPITULASI RETRIBUSI PASAR</h2>
      <h4 style="text-align:center;margin:5px 0 15px 0;font-weight:normal;">PUD PASAR MEDAN — PERIODE ${formatBulanYM(bulan).toUpperCase()}</h4>
      
      <table border="1">
        <thead>
          <tr style="background:#eee;">
            <th>ID Pedagang</th>
            <th>Nama</th>
            <th>Kios</th>
            <th>Nominal Kios</th>
            <th>Kebersihan</th>
            <th>Total Bayar</th>
            <th>Tanggal Lunas</th>
          </tr>
        </thead>
        <tbody>${tableRows}</tbody>
      </table>
      <div style="margin-top:15px;text-align:right;font-weight:bold;font-size:16px;">
        TOTAL PEMASUKAN BULANAN: ${rupiah(totalKios + totalKebersihan)}
      </div>
    </div>`;

  // Suntik ke Monitor UI Admin
  const slot = document.getElementById('laporan-slot');
  if(slot) slot.innerHTML = laporanFinalHtml;

  // Suntik ke Mesin Cetak Kertas (Wajib Ada agar Browser Tidak Blank Saat Tombol Print Ditekan)
  document.getElementById('print-section').innerHTML = laporanFinalHtml;
}

/* ===================== Boot ===================== */
initApp();
</script>
